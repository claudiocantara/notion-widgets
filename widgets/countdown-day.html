<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Countdown Widget</title>
    <!-- Fonte Inter para consistência com a UI do Notion -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Biblioteca de Confetes -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            /* Cores padrão Notion Light */
            --bg-color: #ffffff;
            --text-color: #37352f;
            --accent-color: #2383e2;
            --subtle-text: #787774;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Cores padrão Notion Dark */
                --bg-color: #191919;
                --text-color: #ffffff;
                --accent-color: #2eaadc;
                --subtle-text: #9b9b9b;
            }
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .container {
            text-align: center;
            padding: 20px;
            background-color: var(--bg-color);
            width: 100%;
            max-width: 320px;
            user-select: none;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
            color: var(--subtle-text);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .days-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .days-wrapper:active {
            transform: scale(0.95);
        }

        .number {
            font-size: 72px;
            font-weight: 800;
            color: var(--text-color);
            line-height: 1;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .label {
            font-size: 18px;
            font-weight: 400;
            color: var(--subtle-text);
            margin-top: 4px;
        }

        .target-reached {
            color: var(--accent-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Botão de configuração discreto */
        #settings-link {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 12px;
            color: var(--subtle-text);
            text-decoration: none;
            opacity: 0.15;
            transition: opacity 0.2s;
        }
        #settings-link:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="title" id="display-title">A carregar...</div>
        <div class="days-wrapper" id="click-area" title="Clique para testar os confetes!">
            <div id="days-count" class="number">0</div>
            <div id="days-label" class="label">dias</div>
        </div>
    </div>


    <script>
        // Variável global para controlar disparos de confete
        window.confettiFired = false;

        // Configurações padrão caso não existam parâmetros na URL
        const DEFAULTS = {
            date: "2025-12-31",
            title: "Faltam",
            subtitle: "Dias"
        };

        function getParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                date: params.get('date') || DEFAULTS.date,
                title: params.get('title') || DEFAULTS.title,
                subtitle: params.get('subtitle') || DEFAULTS.title
            };
        }

        function fireConfetti() {
            if (typeof confetti !== 'function') return;
            
            const count = 200;
            const defaults = {
                origin: { y: 0.7 },
                colors: ['#2383e2', '#2eaadc', '#ffffff', '#FFD700']
            };

            function fire(particleRatio, opts) {
                confetti({
                    ...defaults,
                    ...opts,
                    particleCount: Math.floor(count * particleRatio)
                });
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        function updateWidget() {
            const { date, title, subtitle } = getParams();
            const titleEl = document.getElementById('display-title');
            const countEl = document.getElementById('days-count');
            const labelEl = document.getElementById('days-label');

            titleEl.innerText = decodeURIComponent(title);

            // Lógica de tratamento de data local (AAAA-MM-DD)
            const parts = date.split('-');
            const year = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10);
            const day = parseInt(parts[2], 10);
            
            // Criamos a data usando o construtor local (mês é 0-indexado)
            const target = new Date(year, month - 1, day);
            target.setHours(0, 0, 0, 0);

            const now = new Date();
            now.setHours(0, 0, 0, 0);

            // Diferença em milissegundos convertida para dias
            const diffInMs = target - now;
            const diffInDays = Math.ceil(diffInMs / (1000 * 60 * 60 * 24));

            if (diffInDays <= 0) {
                countEl.innerText = "0";
                labelEl.innerText = subtitle;
                countEl.classList.add('target-reached');
                
                // Dispara confete apenas uma vez ao carregar se já for o dia
                if (!window.confettiFired) {
                    fireConfetti();
                    window.confettiFired = true;
                }
            } else {
                countEl.innerText = diffInDays;
                labelEl.innerText = subtitle;
                countEl.classList.remove('target-reached');
                window.confettiFired = false;
            }
        }


        // Permitir disparo manual de confetes ao clicar na área central
        document.getElementById('click-area').addEventListener('click', fireConfetti);

        window.onload = () => {
            updateWidget();
            // Atualiza a cada hora para garantir que a virada do dia seja capturada
            setInterval(updateWidget, 3600000);
        };
    </script>
</body>
</html>
