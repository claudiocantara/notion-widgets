<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Widget</title>
    <!-- Importando fonte Inter para um visual moderno similar ao Notion -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Biblioteca de Confetes (CDN robusto) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #37352f;
            --accent-color: #2383e2;
            --subtle-text: #787774;
            --card-bg: #f7f6f3;
        }

        /* Suporte ao Modo Escuro do Sistema */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #191919;
                --text-color: #ffffff;
                --accent-color: #2eaadc;
                --subtle-text: #9b9b9b;
                --card-bg: #202020;
            }
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: transparent;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            background-color: var(--bg-color);
            border-radius: 12px;
            width: 100%;
            max-width: 300px;
            user-select: none;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
            color: var(--subtle-text);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .days-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .number {
            font-size: 64px;
            font-weight: 800;
            color: var(--text-color);
            line-height: 1;
            margin: 0;
        }

        .label {
            font-size: 18px;
            font-weight: 400;
            color: var(--subtle-text);
            margin-top: 4px;
        }

        .target-reached {
            color: var(--accent-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #settings-link {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            color: var(--subtle-text);
            text-decoration: none;
            opacity: 0.2;
            transition: opacity 0.2s;
        }
        #settings-link:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="container" id="widget-container">
        <div class="title" id="display-title">Carregando...</div>
        <div class="days-wrapper" onclick="launchConfetti()">
            <div id="days-count" class="number">0</div>
            <div id="days-label" class="label">dias</div>
        </div>
    </div>

    <a href="#" id="settings-link" onclick="updateParams()">⚙️ Configurar</a>

    <script>
        window.confettiFired = false;

        // VALORES PADRÕES (Caso a URL esteja vazia)
        const DEFAULT_DATE = "2025-12-31"; 
        const DEFAULT_TITLE = "Faltam";

        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                targetDate: params.get('date') || DEFAULT_DATE,
                title: params.get('title') || DEFAULT_TITLE
            };
        }

        function launchConfetti() {
            if (typeof confetti !== 'function') return;

            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 },
                    colors: ['#2383e2', '#2eaadc', '#ffffff', '#ffcc00']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 },
                    colors: ['#2383e2', '#2eaadc', '#ffffff', '#ffcc00']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function updateCountdown() {
            const config = getQueryParams();
            const titleEl = document.getElementById('display-title');
            const daysEl = document.getElementById('days-count');
            const labelEl = document.getElementById('days-label');
            
            titleEl.innerText = decodeURIComponent(config.title);

            // Ajuste de fuso horário: Tratando a data como local para evitar erro de 1 dia
            // Dividimos a string e criamos o objeto Date localmente
            const parts = config.targetDate.split('-');
            const targetDate = new Date(parts[0], parts[1] - 1, parts[2]);
            
            // Data atual com hora zerada para comparação justa de dias
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            targetDate.setHours(0, 0, 0, 0);

            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays <= 0) {
                daysEl.innerText = "0";
                labelEl.innerText = "Chegou o dia! 🎉";
                daysEl.classList.add('target-reached');
                
                if (!window.confettiFired) {
                    launchConfetti();
                    window.confettiFired = true;
                }
            } else {
                daysEl.innerText = diffDays;
                labelEl.innerText = diffDays === 1 ? "dia restante" : "dias restantes";
                daysEl.classList.remove('target-reached');
                window.confettiFired = false;
            }
        }

        function updateParams() {
            const date = prompt("Data (AAAA-MM-DD):", DEFAULT_DATE);
            const title = prompt("Título:", DEFAULT_TITLE);
            if (date) {
                const url = new URL(window.location.href);
                url.searchParams.set('date', date);
                url.searchParams.set('title', title || DEFAULT_TITLE);
                window.location.href = url.toString();
            }
        }

        window.onload = () => {
            setTimeout(updateCountdown, 100);
            setInterval(updateCountdown, 3600000); // Atualiza a cada hora
        };
    </script>
</body>
</html>
